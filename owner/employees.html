<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการพนักงาน | ป้าณาน้ำผลไม้ปั่น</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body>
    <div class="app-container">
        <div id="header"></div>
        <main class="main-content">
            <div class="page-header">
                <div class="breadcrumb"><a href="dashboard.html">🏠 หน้าแรก</a> <span>/</span> จัดการพนักงาน</div>
                <h1>👥 จัดการพนักงาน</h1>
                <p>เพิ่มและจัดการพนักงานในร้าน</p>
            </div>
            <div class="page-content">
                <div class="products-header">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="employeeSearch" class="form-input"
                            placeholder="ค้นหาชื่อ, ชื่อผู้ใช้, อีเมล..." style="padding-left:2.5rem">
                    </div>
                    <button class="btn btn-primary" onclick="openEmployeeModal()">✚ เพิ่มพนักงานใหม่</button>
                </div>
                <div class="card animate-fade-in">
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>ชื่อ-นามสกุล</th>
                                    <th>อีเมล</th>
                                    <th>เบอร์โทร</th>
                                    <th>วันที่เพิ่ม</th>
                                    <th style="width:100px">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="employeesBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div id="footer"></div>
        </main>
    </div>

    <!-- Employee Modal -->
    <div class="modal-overlay" id="employeeModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="empModalTitle">เพิ่มพนักงานใหม่</h3>
                <button class="modal-close" onclick="closeEmployeeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="empForm" onsubmit="event.preventDefault();saveEmployee()" data-edit-id="">
                    <div class="form-group">
                        <label for="empName">ชื่อ-นามสกุล</label>
                        <input type="text" id="empName" class="form-input" placeholder="กรอกชื่อ-นามสกุล" required>
                    </div>
                    <div class="form-group">
                        <label for="empUsername">ชื่อผู้ใช้</label>
                        <input type="text" id="empUsername" class="form-input" placeholder="ชื่อสำหรับเข้าสู่ระบบ"
                            required>
                    </div>
                    <div class="form-group">
                        <label for="empPassword">รหัสผ่าน</label>
                        <input type="password" id="empPassword" class="form-input" placeholder="ตั้งรหัสผ่าน" required
                            minlength="4">
                        <small id="passHint" style="display:none;color:var(--text-muted)">*
                            ปล่อยว่างไว้หากไม่ต้องการเปลี่ยนรหัสผ่าน</small>
                    </div>
                    <div class="form-group">
                        <label for="empEmail">อีเมล</label>
                        <input type="email" id="empEmail" class="form-input" placeholder="example@mail.com">
                    </div>
                    <div class="form-group">
                        <label for="empPhone">เบอร์โทรศัพท์</label>
                        <input type="tel" id="empPhone" class="form-input" placeholder="08x-xxx-xxxx">
                    </div>
                    <div class="form-group">
                        <label for="empLineId">Line ID</label>
                        <input type="text" id="empLineId" class="form-input" placeholder="Line ID ของพนักงาน">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeEmployeeModal()">ยกเลิก</button>
                <button class="btn btn-primary" onclick="saveEmployee()" id="btnSaveEmp">💾 บันทึก</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
