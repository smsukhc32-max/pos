<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการสินค้า | ป้าณาน้ำผลไม้ปั่น</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body>

    </div>
    <div class="app-container">
        <div id="header"></div>
        <main class="main-content">
            <div class="page-header">
                <div class="breadcrumb"><a href="dashboard.html">🏠 หน้าแรก</a> <span>/</span> จัดการสินค้า</div>
                <h1>🍹 จัดการสินค้า</h1>
                <p>เพิ่ม แก้ไข และลบสินค้าในร้าน</p>
            </div>
            <div class="page-content">
                <div class="products-header">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="productSearch" class="form-input" placeholder="ค้นหาสินค้า..."
                            style="padding-left:2.5rem">
                    </div>
                    <div style="display:flex; gap:10px; flex-wrap:wrap;">
                        <button class="btn btn-primary" onclick="openProductModal()">
                            ✚ เพิ่มสินค้าใหม่
                        </button>

                    </div>
                </div>
                <div class="card animate-fade-in">
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th style="width:50px"></th>
                                    <th>ชื่อสินค้า</th>
                                    <th>ราคา</th>
                                    <th>สถานะ</th>
                                    <th style="width:160px">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="productsBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div id="footer"></div>
        </main>
    </div>

    <!-- Product Modal -->
    <div class="modal-overlay" id="productModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">เพิ่มสินค้าใหม่</h3>
                <button class="modal-close" onclick="closeProductModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="productForm" onsubmit="event.preventDefault();saveProduct()">
                    <div class="form-group">
                        <label>รูปภาพสินค้า</label>
                        <div style="display:flex; gap:1rem; align-items:center;">
                            <img id="pImgPreview" src=""
                                style="width:60px; height:60px; object-fit:cover; border-radius:8px; display:none; border: 1px solid var(--border);">
                            <div id="pEmojiPreview" style="font-size:3rem;">🍹</div>
                            <input type="file" id="pImgUpload" class="form-input" accept="image/*" style="flex:1"
                                onchange="previewProductImage(this)">
                            <input type="hidden" id="pEmoji" value="🍹">
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="pName">ชื่อสินค้า</label>
                        <input type="text" id="pName" class="form-input" placeholder="เช่น น้ำมะม่วงปั่น" required>
                    </div>
                    <div class="form-group">
                        <label for="pCategory">หมวดหมู่สินค้า</label>
                        <select id="pCategory" class="form-input form-select" required onchange="onCategoryChange()">
                            <option value="ผลไม้ปั่น">🍹 ผลไม้ปั่น</option>
                            <option value="น้ำคั้นสด">🥤 น้ำคั้นสด</option>
                            <option value="สมูทตี้">🍇 สมูทตี้</option>
                            <option value="__NEW__">➕ เพิ่มหมวดหมู่ใหม่...</option>
                        </select>
                        <input type="text" id="pNewCategory" class="form-input" placeholder="ระบุชื่อหมวดหมู่ใหม่..."
                            style="display:none; margin-top: 8px;">
                    </div>
                    <div class="form-group">
                        <label for="pPrice">ราคา (บาท)</label>
                        <input type="number" id="pPrice" class="form-input" placeholder="0" required min="1">
                    </div>

                    <div class="form-group">
                        <label for="pDesc">รายละเอียด</label>
                        <input type="text" id="pDesc" class="form-input" placeholder="คำอธิบายสั้นๆ">
                    </div>
                    <div class="form-group">
                        <label for="pStatus">สถานะ</label>
                        <select id="pStatus" class="form-input form-select">
                            <option value="active">✅ ขายอยู่</option>
                            <option value="inactive">❌ ปิดการขาย</option>
                        </select>
                    </div>

                    <!-- Fruit Addon Section -->
                    <div class="form-group" style="margin-top:1rem; padding:1rem; border:2px solid var(--border-light); border-radius:var(--radius-lg); background:linear-gradient(135deg, #fff9f0 0%, #fff3e6 100%);">
                        <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;">
                            <label style="font-weight:700; font-size:var(--font-base); margin:0; display:flex; align-items:center; gap:6px;">
                                🍇 เพิ่มผลไม้ (Add-on)
                            </label>
                            <label class="toggle-switch" style="position:relative; display:inline-block; width:50px; height:26px;">
                                <input type="checkbox" id="pFruitAddonEnabled" onchange="toggleFruitAddonPrice()"
                                    style="opacity:0; width:0; height:0;">
                                <span class="toggle-slider" style="position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#ccc; border-radius:26px; transition:.3s;"></span>
                            </label>
                        </div>
                        <p style="font-size:var(--font-xs); color:var(--text-secondary); margin:0 0 10px 0;">
                            เปิดตัวเลือกนี้เพื่อให้ลูกค้าสามารถเพิ่มผลไม้ในเครื่องดื่มได้
                        </p>
                        <div id="fruitAddonPriceGroup" style="display:none;">
                            <label for="pFruitAddonPrice" style="font-weight:600; font-size:var(--font-sm);">💰 ราคาเพิ่มผลไม้ (บาท)</label>
                            <input type="number" id="pFruitAddonPrice" class="form-input" placeholder="เช่น 10, 15, 20" min="0" value="0"
                                style="margin-top:6px;">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeProductModal()">ยกเลิก</button>
                <button class="btn btn-primary" onclick="saveProduct()">💾 บันทึก</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
