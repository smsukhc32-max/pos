<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ภาพรวม | พนักงาน</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body>
    <div class="app-container">
        <div id="header"></div>
        <main class="main-content">
            <div class="page-header">
                <div class="breadcrumb"><a href="dashboard.html">🏠 หน้าแรก</a> <span>/</span> ภาพรวม</div>
                <h1>📊 ภาพรวมวันนี้</h1>
                <p>สรุปยอดขายประจำวัน</p>
            </div>
            <div class="page-content">
                <div class="stats-grid stagger">
                    <div class="card stat-card animate-fade-in">
                        <div class="stat-icon" style="background:var(--primary-bg);color:var(--primary)">💰</div>
                        <div class="stat-info">
                            <h3>รายได้วันนี้</h3>
                            <div class="stat-value" id="statRevenue">฿0</div>
                        </div>
                    </div>
                    <div class="card stat-card animate-fade-in">
                        <div class="stat-icon" style="background:var(--secondary-bg);color:var(--secondary-dark)">📦
                        </div>
                        <div class="stat-info">
                            <h3>ออเดอร์วันนี้</h3>
                            <div class="stat-value" id="statOrders">0</div>
                        </div>
                    </div>
                    <div class="card stat-card animate-fade-in">
                        <div class="stat-icon" style="background:var(--success-bg);color:var(--success)">📈</div>
                        <div class="stat-info">
                            <h3>ยอดเฉลี่ย/ออเดอร์</h3>
                            <div class="stat-value" id="statAvg">฿0</div>
                        </div>
                    </div>
                </div>

                <div class="recent-orders animate-fade-in" style="margin-top:var(--sp-xl)">
                    <h3>📋 ออเดอร์ล่าสุด</h3>
                    <div class="card">
                        <div class="table-wrapper">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th>เลขที่</th>
                                        <th>รายการ</th>
                                        <th>ยอดรวม</th>
                                        <th>สถานะ</th>
                                        <th>วันที่</th>
                                    </tr>
                                </thead>
                                <tbody id="recentOrders"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div id="footer"></div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/data.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/components.js"></script>
    <script src="../js/app.js"></script>
</body>

</html>
