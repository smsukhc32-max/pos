<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ระบบ POS ร้านป้าณาน้ำผลไม้ปั่น - เข้าสู่ระบบ">
  <title>เข้าสู่ระบบ | ป้าณาน้ำผลไม้ปั่น</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/pages.css">
</head>

<body>
  <div class="auth-page">
    <!-- Product Showcase Section -->
    <div class="showcase-section animate-fade-in">
      <h2 class="showcase-title">🍹 เครื่องดื่มแนะนำ</h2>
      <div class="showcase-grid" id="productShowcase">
        <!-- Products will be loaded here -->
      </div>
    </div>

    <div class="auth-card">
      <div class="auth-logo">
        <img src="assets/Logo.png" alt="Logo" class="logo-icon">
        <h1>ป้าณาน้ำผลไม้ปั่น</h1>
        <p>ระบบจัดการร้านน้ำผลไม้</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">ชื่อผู้ใช้</label>
          <input type="text" id="username" class="form-input" placeholder="กรอกชื่อผู้ใช้" required
            autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">รหัสผ่าน</label>
          <input type="password" id="password" class="form-input" placeholder="กรอกรหัสผ่าน" required
            autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-lg">เข้าสู่ระบบ</button>
      </form>
      <div class="auth-divider">หรือ</div>
      <a href="register.html" class="btn btn-outline btn-block">สมัครสมาชิกใหม่</a>
      <div class="auth-footer" style="text-align: center; margin-top: 1.5rem;">
        <a href="https://heyzine.com/flip-book/f419056a81.html" target="_blank"
          style="text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
            <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
          </svg>
          คู่มือการใช้งาน
        </a>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
